name: Selenium Web Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Run Selenium Tests
      run: ./gradlew :selenium-tests:test

    # Publish XML test results directly to GitHub Actions Run summary
    - name: Publish Test Results
      uses: mikepenz/action-junit-report@v4
      if: always() # Runs even if tests fail
      with:
        report_paths: '**/build/test-results/test/TEST-*.xml'

    # Upload the detailed HTML report and styled Excel report as artifacts
    - name: Upload Test Report Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: selenium-test-reports
        path: |
          selenium-tests/build/reports/tests/test/
          selenium-tests/reports/Selenium_UI_Report.xlsx
